name: Rebuild & Deploy

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for rebuild (optional)"
        required: false
        type: string

  # Also allow triggering via repository_dispatch (API call)
  repository_dispatch:
    types: [rebuild]

jobs:
  trigger-vercel-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          echo "Triggering Vercel rebuild..."
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          if [ "$response" = "200" ] || [ "$response" = "201" ]; then
            echo "✓ Deploy triggered successfully"
          else
            echo "✗ Deploy hook returned HTTP $response"
            exit 1
          fi

      - name: Summary
        run: |
          echo "## Rebuild Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Reason:** ${{ github.event.inputs.reason || 'Manual rebuild' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
